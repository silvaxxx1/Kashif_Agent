# Kashif configuration
# Edit this file to switch LLM providers, tune CV, or adjust cleaning thresholds.

llm:
  provider: groq                      # groq | anthropic | ollama
  model: llama-3.3-70b-versatile      # model ID for the chosen provider
  api_key_env: GROQ_API_KEY           # env var name — NOT the key itself (not used for ollama)
  temperature: 0.2
  max_tokens: 4096
  # base_url: http://localhost:11434/v1  # ollama only — override for remote deployments

fe_agent:
  max_rounds: 10
  delta_threshold: 0.005              # stop if CV improvement < 0.5%

training:
  settings:
    cv_folds: 5
    random_state: 42
  model_selection:
    models:
      classification:
        - XGBoost
        - LightGBM
        - Random Forest
        - Logistic Regression
        - Gradient Boosting
      regression:
        - XGBoost
        - LightGBM
        - Random Forest
        - Ridge
        - Gradient Boosting
  cleaning:
    cardinality:
      max_unique_share: 0.9
    variance:
      min_threshold: 0.0
    nan_thresholds:
      numeric: 0.5
      categorical: 0.5
